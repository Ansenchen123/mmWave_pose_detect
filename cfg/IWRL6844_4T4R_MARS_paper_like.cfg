% MARS paper-like profile for xWRL6844EVM.
% Target paper/template characteristics:
% - frame period: 100 ms
% - chirps per frame: 128
% - ADC sample rate: ~2.5 Msps
% - slope: 100 MHz/us
% - ramp duration: ~32 us, bandwidth ~3.2 GHz, range resolution ~4.69 cm
% - range FOV: 0.20 m to 3.37 m
% - Doppler FOV: +/-5.69 m/s
% Note: xWRL6844 uses 57-64 GHz and 4TX/4RX OOB CLI format, so this is
% paper-like in resolution/frame behavior rather than a byte-for-byte 1843 cfg.
% The MARS paper uses 96 chirps/frame, but xWRL6844 OOB requires a power-of-2
% Doppler chirp count when clutterRemoval is enabled. 128 keeps clutter removal
% enabled while preserving the same range-resolution profile and 100 ms frame.
sensorStop 0
channelCfg 153 255 0
chirpComnCfg 40 0 0 80 1 32 1
chirpTimingCfg 6 63 0 100 58
adcDataDitherCfg 0
frameCfg 128 0 11000 1 100 0
gpAdcMeasConfig 0 0
guiMonitor 1 0 0 0 0 1
cfarProcCfg 0 2 4 1 2 0 7.0 0
cfarProcCfg 1 2 4 1 2 1 7.0 0
cfarFovCfg 0 0.20 3.37
cfarFovCfg 1 -5.69 5.69
aoaProcCfg 128 128
aoaFovCfg -45 45 -90 90
clutterRemoval 1
factoryCalibCfg 0 0 44 2 0x1ff000
runtimeCalibCfg 1
antGeometryBoard xWRL6844EVM
adcDataSource 0 adc_test_data_0001.bin
adcLogging 0
lowPowerCfg 0
sensorStart 0 0 0 0
