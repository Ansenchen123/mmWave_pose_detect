sensorStop 0
channelCfg 153 255 0
apllFreqShiftEn 0
chirpComnCfg 8 0 0 256 1 13.1 3
chirpTimingCfg 6 63 0 160 58
adcDataDitherCfg 1
frameCfg 64 0 1358 1 100 0
gpAdcMeasConfig 0 0

% 1843-style return content: point cloud + stats only
% Similar to old guiMonitor -1 1 0 0 0 0 1
guiMonitor 1 0 0 0 0 1

% 1843-style CFAR filtering / threshold
% Old range CFAR:   cfarCfg -1 0 2 8 4 3 0 20 0
% Old doppler CFAR: cfarCfg -1 1 0 4 2 3 1 20 0
cfarProcCfg 0 2 8 4 3 0 15.0 0
cfarProcCfg 1 0 4 2 3 1 15.0 0

% 1843-style FOV limits
% Old range FOV:   cfarFovCfg -1 0 0 8.92
% Old doppler FOV: cfarFovCfg -1 1 -1 1
cfarFovCfg 0 0.00 8.92
cfarFovCfg 1 -1.00 1.00

aoaProcCfg 64 64

% Old AoA FOV: aoaFovCfg -1 -90 90 -90 90
aoaFovCfg -90 90 -90 90

% Old clutterRemoval -1 0
clutterRemoval 0

% Below to be used in customer factory calibration
factoryCalibCfg 1 0 44 2 0x1ff000
% Below to be used in field
% factoryCalibCfg 0 1 44 2 0x1ff000
% For backoff > 3dB, OLPC not supported
runtimeCalibCfg 1
antGeometryBoard xWRL6844EVM
adcDataSource 0 adc_test_data_0001.bin
adcLogging 0

% Similar to old lowPower 0 0; safer for debugging and stable output
lowPowerCfg 0
sensorStart 0 0 0 0
